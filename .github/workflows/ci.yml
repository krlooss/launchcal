name: Build and Publish APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Set version info
        run: |
          VERSION=$(( ${{ github.run_number }} + 12 ))
          echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.$VERSION" >> $GITHUB_ENV

      - run: ./gradlew assembleDebug test
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: v${{ env.VERSION_NAME }} (${{ env.SHORT_SHA }})
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true

      - name: Upload APK artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: launchcal-${{ env.SHORT_SHA }}.apk
          path: app/build/outputs/apk/debug/app-debug.apk
